<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JFK T1 Bracket Challenge 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0c10;--bg2:#111318;--bg3:#181c24;--bg4:#1f2430;
  --border:#252a35;--border2:#2e3545;
  --accent:#f97316;--accent2:#fb923c;--accent-dim:rgba(249,115,22,0.15);
  --green:#22c55e;--green-bg:rgba(34,197,94,0.1);
  --red:#ef4444;--red-bg:rgba(239,68,68,0.1);
  --yellow:#eab308;--blue:#3b82f6;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
  --gold:#fbbf24;--silver:#94a3b8;--bronze:#b45309;
  --font-display:'Bebas Neue',sans-serif;
  --font-body:'DM Sans',sans-serif;
  --font-mono:'DM Mono',monospace;
}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* HEADER */
header{
  background:linear-gradient(135deg,#0d1117 0%,#111827 50%,#0d1117 100%);
  border-bottom:1px solid var(--border);
  padding:0 32px;
  display:flex;align-items:center;justify-content:space-between;
  height:64px;position:sticky;top:0;z-index:100;
  backdrop-filter:blur(12px);
}
.logo{
  font-family:var(--font-display);font-size:1.6rem;letter-spacing:2px;
  color:var(--text);display:flex;align-items:center;gap:12px;
}
.logo-accent{color:var(--accent)}
.header-meta{display:flex;gap:8px;flex-wrap:wrap}
.badge{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:6px;padding:4px 10px;
  font-size:0.72rem;font-weight:500;color:var(--text2);
  font-family:var(--font-mono);
}
.badge strong{color:var(--text)}

/* NAV */
nav{
  background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;gap:0;overflow-x:auto;padding:0 24px;
}
nav::-webkit-scrollbar{display:none}
.nav-btn{
  background:none;border:none;color:var(--text3);
  padding:14px 18px;font-size:0.82rem;font-weight:600;
  font-family:var(--font-body);cursor:pointer;
  border-bottom:2px solid transparent;
  transition:all 0.2s;white-space:nowrap;
  text-transform:uppercase;letter-spacing:0.8px;
}
.nav-btn:hover{color:var(--text)}
.nav-btn.active{color:var(--accent);border-bottom-color:var(--accent)}

/* CONTENT */
.content{padding:28px 32px;max-width:1440px;margin:0 auto}
.tab-pane{display:none}.tab-pane.active{display:block}

/* SELECTS & INPUTS */
select,input[type=text]{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:8px;color:var(--text);
  padding:9px 14px;font-size:0.87rem;font-family:var(--font-body);
  outline:none;cursor:pointer;transition:border 0.2s;
}
select:focus,input[type=text]:focus{border-color:var(--accent)}
input[type=text]::placeholder{color:var(--text3)}
select option{background:var(--bg3)}

/* TABLES */
.table-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:0.84rem}
thead tr{background:var(--bg3);border-bottom:1px solid var(--border2)}
th{
  padding:11px 14px;text-align:left;font-weight:600;
  font-size:0.7rem;text-transform:uppercase;letter-spacing:0.8px;
  color:var(--text3);white-space:nowrap;cursor:pointer;user-select:none;
}
th:hover{color:var(--text)}
th.sorted{color:var(--accent)}
tbody tr{border-bottom:1px solid var(--border);transition:background 0.12s}
tbody tr:hover{background:var(--bg3)}
tbody tr:last-child{border-bottom:none}
td{padding:10px 14px;white-space:nowrap}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px}
.card-sm{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px 18px}

/* STATS ROW */
.stats-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:24px}
.stat-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:10px;padding:14px 20px;min-width:130px;flex:1;
}
.stat-label{font-size:0.68rem;text-transform:uppercase;letter-spacing:0.8px;color:var(--text3);margin-bottom:4px}
.stat-value{font-family:var(--font-display);font-size:1.8rem;letter-spacing:1px;color:var(--text)}
.stat-sub{font-size:0.74rem;color:var(--text2);margin-top:2px}
.stat-card.accent .stat-value{color:var(--accent)}
.stat-card.green .stat-value{color:var(--green)}

/* RANK COLORS */
.rank-1{color:var(--gold)}
.rank-2{color:var(--silver)}
.rank-3{color:var(--bronze)}
.row-1{background:rgba(251,191,36,0.04)!important}
.row-2{background:rgba(148,163,184,0.03)!important}
.row-3{background:rgba(180,83,9,0.03)!important}

/* PICK RESULT */
.correct{color:var(--green);font-weight:600}
.incorrect{color:var(--red)}
.tbd-pick{color:var(--text3)}
.correct::after{content:' ✓';font-size:0.8em}
.incorrect::after{content:' ✗';font-size:0.8em}

/* PILL */
.pill{
  display:inline-flex;align-items:center;
  border-radius:20px;padding:2px 9px;
  font-size:0.68rem;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;
}
.pill-green{background:var(--green-bg);color:var(--green);border:1px solid rgba(34,197,94,0.2)}
.pill-red{background:var(--red-bg);color:var(--red);border:1px solid rgba(239,68,68,0.2)}
.pill-gray{background:var(--bg4);color:var(--text3);border:1px solid var(--border)}
.pill-orange{background:var(--accent-dim);color:var(--accent);border:1px solid rgba(249,115,22,0.2)}

/* SECTION TITLE */
.section-title{
  font-family:var(--font-display);font-size:1.1rem;letter-spacing:1.5px;
  color:var(--text2);margin-bottom:12px;display:flex;align-items:center;gap:10px;
}

/* H2H */
.h2h-selectors{display:flex;gap:16px;align-items:flex-end;flex-wrap:wrap;margin-bottom:24px}
.h2h-player{flex:1;min-width:200px}
.h2h-player label{display:block;font-size:0.7rem;text-transform:uppercase;letter-spacing:0.8px;color:var(--text3);margin-bottom:6px;font-weight:600}
.h2h-player select{width:100%}
.vs-badge{
  font-family:var(--font-display);font-size:1.4rem;letter-spacing:2px;
  color:var(--accent);padding-bottom:2px;
}
.h2h-summary{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:24px}
.h2h-card{
  flex:1;min-width:120px;background:var(--bg3);
  border:1px solid var(--border);border-radius:10px;
  padding:14px 16px;text-align:center;
}
.h2h-card.leading{border-color:var(--accent)}
.h2h-card .hc-label{font-size:0.67rem;text-transform:uppercase;letter-spacing:0.8px;color:var(--text3);margin-bottom:4px}
.h2h-card .hc-value{font-family:var(--font-display);font-size:1.6rem;letter-spacing:1px}
.h2h-card .hc-sub{font-size:0.72rem;color:var(--text3);margin-top:2px}
.h2h-card.leading .hc-value{color:var(--accent)}
.h2h-card.agree .hc-value{color:var(--green)}
.h2h-card.diff .hc-value{color:var(--red)}

.h2h-round-title{
  font-family:var(--font-display);font-size:0.95rem;letter-spacing:1.5px;
  color:var(--text3);padding:14px 0 8px;
  border-bottom:1px solid var(--border);margin-bottom:0;
  display:flex;align-items:center;gap:10px;
}
.h2h-grid-head,.h2h-row{
  display:grid;
  grid-template-columns:1.4fr 1fr 1fr 70px 70px;
  gap:8px;padding:9px 14px;font-size:0.83rem;align-items:center;
}
.h2h-grid-head{
  background:var(--bg3);font-size:0.68rem;text-transform:uppercase;
  letter-spacing:0.8px;color:var(--text3);font-weight:600;
  border-radius:8px 8px 0 0;border:1px solid var(--border);
}
.h2h-row{border:1px solid var(--border);border-top:none;transition:background 0.12s}
.h2h-row:hover{background:var(--bg3)}
.h2h-row:last-child{border-radius:0 0 8px 8px}

/* BRACKET VIEW */
.player-hero{
  background:linear-gradient(135deg,var(--bg2),var(--bg3));
  border:1px solid var(--border);border-radius:14px;
  padding:20px 24px;margin-bottom:24px;
  display:flex;gap:24px;flex-wrap:wrap;align-items:center;
}
.hero-name{font-family:var(--font-display);font-size:1.8rem;letter-spacing:1.5px;flex:1;min-width:200px}
.hero-stat{text-align:center;min-width:70px}
.hero-stat .hs-label{font-size:0.65rem;text-transform:uppercase;letter-spacing:0.8px;color:var(--text3)}
.hero-stat .hs-value{font-family:var(--font-display);font-size:1.5rem;color:var(--accent);letter-spacing:1px}
.hero-picks{display:flex;gap:12px;flex-wrap:wrap}
.hero-pick{background:var(--bg4);border:1px solid var(--border);border-radius:8px;padding:8px 14px}
.hero-pick .hp-label{font-size:0.65rem;text-transform:uppercase;letter-spacing:0.8px;color:var(--text3)}
.hero-pick .hp-value{font-size:0.95rem;font-weight:700;color:var(--accent2);margin-top:2px}

.acc-bar-wrap{margin-bottom:24px}
.acc-bar-labels{display:flex;justify-content:space-between;font-size:0.75rem;color:var(--text3);margin-bottom:6px}
.acc-bar-labels strong{color:var(--text)}
.acc-bar{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden}
.acc-bar-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--accent));border-radius:3px;transition:width 0.5s ease}

.round-block{margin-bottom:28px}
.round-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.round-header h3{font-family:var(--font-display);font-size:1rem;letter-spacing:1.5px;color:var(--text3)}
.round-pts{margin-left:auto;font-size:0.75rem;color:var(--text3)}
.round-pts strong{color:var(--text)}
.games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px}
.game-card{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:10px;padding:12px 14px;transition:border-color 0.2s;
}
.game-card.correct{border-color:rgba(34,197,94,0.4);background:rgba(34,197,94,0.04)}
.game-card.incorrect{border-color:rgba(239,68,68,0.3);background:rgba(239,68,68,0.04)}
.game-matchup{font-size:0.68rem;text-transform:uppercase;letter-spacing:0.5px;color:var(--text3);margin-bottom:5px}
.game-pick{font-size:0.92rem;font-weight:700}
.game-result{margin-top:6px}

/* INSIGHTS TAB */
.insights-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;margin-bottom:28px}
.insight-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px}
.insight-title{font-family:var(--font-display);font-size:0.95rem;letter-spacing:1.5px;color:var(--text2);margin-bottom:14px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:0.82rem}
.bar-label{width:90px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}
.bar-track{flex:1;height:6px;background:var(--bg4);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;background:var(--accent);transition:width 0.4s}
.bar-fill.green{background:var(--green)}
.bar-fill.blue{background:var(--blue)}
.bar-count{width:30px;text-align:right;color:var(--text3);font-family:var(--font-mono);font-size:0.75rem;flex-shrink:0}

.upset-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 0;border-bottom:1px solid var(--border);font-size:0.83rem;
}
.upset-row:last-child{border-bottom:none}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-icon{font-size:2.5rem;margin-bottom:12px}

/* LOADING */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:200px;gap:12px;color:var(--text3)}
.spinner{width:36px;height:36px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

@media(max-width:640px){
  .content{padding:16px}header{padding:0 16px}nav{padding:0 12px}
  .h2h-grid-head,.h2h-row{grid-template-columns:1fr 80px 80px 55px 55px;font-size:0.75rem}
  .stats-row .stat-card{min-width:100px}
}
</style>
</head>
<body>

<header>
  <div class="logo">🏀 JFK <span class="logo-accent">T1</span> BRACKET CHALLENGE
    <span style="font-family:var(--font-body);font-size:0.75rem;color:var(--text3);font-weight:400;letter-spacing:0">2026</span>
  </div>
  <div class="header-meta">
    <div class="badge"><strong id="hdr-total">—</strong> Entries</div>
    <div class="badge">Complete: <strong id="hdr-complete">—</strong></div>
    <div class="badge">Remaining: <strong id="hdr-remaining">—</strong></div>
  </div>
</header>

<nav>
  <button class="nav-btn active" data-tab="leaderboard">🏆 Leaderboard</button>
  <button class="nav-btn" data-tab="h2h">⚔️ Head-to-Head</button>
  <button class="nav-btn" data-tab="bracket">📋 My Bracket</button>
  <button class="nav-btn" data-tab="insights">📊 Pool Insights</button>
  <button class="nav-btn" data-tab="champion">🎯 Champion Picks</button>
</nav>

<div class="content">

<!-- ══════════════ LEADERBOARD ══════════════ -->
<div id="tab-leaderboard" class="tab-pane active">
  <div class="loading" id="lb-loading"><div class="spinner"></div><span>Loading standings...</span></div>
  <div id="lb-body" style="display:none">
    <div class="stats-row" id="lb-stats"></div>
    <div style="display:flex;gap:12px;align-items:center;margin-bottom:16px;flex-wrap:wrap">
      <input type="text" id="lb-search" placeholder="🔍  Search by name..." style="width:250px">
      <span id="lb-count" style="color:var(--text3);font-size:0.8rem;font-family:var(--font-mono)"></span>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th data-col="rank" class="sorted">Rank</th>
          <th data-col="name">Name</th>
          <th data-col="total" style="color:var(--accent)">Total ▼</th>
          <th data-col="totalR1">R1</th>
          <th data-col="totalR2">R2</th>
          <th data-col="totalS16">S16</th>
          <th data-col="totalE8">E8</th>
          <th data-col="totalFF">FF</th>
          <th>Champion Pick</th>
          <th>Runner-Up</th>
        </tr></thead>
        <tbody id="lb-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- ══════════════ HEAD-TO-HEAD ══════════════ -->
<div id="tab-h2h" class="tab-pane">
  <div class="h2h-selectors">
    <div class="h2h-player">
      <label>Player A</label>
      <select id="h2h-a"><option value="">— Select player —</option></select>
    </div>
    <div class="vs-badge">VS</div>
    <div class="h2h-player">
      <label>Player B</label>
      <select id="h2h-b"><option value="">— Select player —</option></select>
    </div>
  </div>
  <div id="h2h-content">
    <div class="empty"><div class="empty-icon">⚔️</div>Select two players above to compare picks</div>
  </div>
</div>

<!-- ══════════════ BRACKET ══════════════ -->
<div id="tab-bracket" class="tab-pane">
  <div style="display:flex;gap:12px;align-items:center;margin-bottom:24px;flex-wrap:wrap">
    <label style="font-size:0.7rem;text-transform:uppercase;letter-spacing:0.8px;color:var(--text3);font-weight:600">Select Participant</label>
    <select id="bracket-player" style="min-width:260px"><option value="">— Choose a player —</option></select>
  </div>
  <div id="bracket-content">
    <div class="empty"><div class="empty-icon">📋</div>Select a participant to view their full bracket</div>
  </div>
</div>

<!-- ══════════════ INSIGHTS ══════════════ -->
<div id="tab-insights" class="tab-pane">
  <div id="insights-content"><div class="loading"><div class="spinner"></div></div></div>
</div>

<!-- ══════════════ CHAMPION PICKS ══════════════ -->
<div id="tab-champion" class="tab-pane">
  <div id="champion-content"><div class="loading"><div class="spinner"></div></div></div>
</div>

</div><!-- /content -->

<script>
// ═══════════════════════════════════════
// DATA + BOOT
// ═══════════════════════════════════════
let D = null;

async function boot() {
  try {
    const r = await fetch('bracket_data.json');
    D = await r.json();
    initAll();
  } catch(e) {
    document.getElementById('lb-loading').innerHTML = `
      <div style="color:var(--red);text-align:center;padding:40px">
        <div style="font-size:2rem">⚠️</div>
        <div style="margin-top:8px;font-weight:600">Failed to load bracket_data.json</div>
        <div style="font-size:0.78rem;color:var(--text3);margin-top:6px">${e.message}</div>
        <div style="font-size:0.75rem;color:var(--text3);margin-top:4px">Serve via HTTP, not file://</div>
      </div>`;
  }
}

function initAll() {
  const m = D.metadata;
  document.getElementById('hdr-total').textContent = m.totalParticipants;
  document.getElementById('hdr-complete').textContent = m.roundsComplete.join(', ');
  document.getElementById('hdr-remaining').textContent = [...(m.roundsInProgress||[]),...m.roundsRemaining].join(', ');
  initLeaderboard();
  initH2H();
  initBracket();
  initInsights();
  initChampion();
}

// ═══════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════
function norm(s){ return s ? s.trim().toLowerCase().replace(/\./g,'').replace(/['']/g,"'") : ''; }

function pickCorrect(col, pick) {
  const actual = D.actualResults[col];
  if (!actual || actual === 'TBD') return null;
  return norm(pick) === norm(actual);
}

function getParticipant(name) { return D.participants.find(p => p.name === name); }

const ROUND_ORDER = ['Round 1','Round 2','Sweet 16','Elite 8','Final Four'];
const ROUND_LABELS = {'Round 1':'Round 1','Round 2':'Round of 32','Sweet 16':'Sweet Sixteen','Elite 8':'Elite Eight','Final Four':'Final Four'};
const COMPLETE_ROUNDS = new Set(D ? D.metadata.roundsComplete : []);

function gamesByRound() {
  const g = {};
  for (const game of D.games) {
    if (!g[game.round]) g[game.round] = [];
    g[game.round].push(game);
  }
  return g;
}

// ═══════════════════════════════════════
// LEADERBOARD
// ═══════════════════════════════════════
let lbSort = {col:'rank', asc:true};
let lbSearch = '';

function initLeaderboard() {
  // Stats
  const pts = D.participants.map(p=>p.total);
  const avg = pts.reduce((a,b)=>a+b,0)/pts.length;
  const leader = D.participants[0];
  const last = D.participants[D.participants.length-1];

  document.getElementById('lb-stats').innerHTML = `
    <div class="stat-card accent"><div class="stat-label">Leader</div><div class="stat-value">${leader.total}</div><div class="stat-sub">${leader.name}</div></div>
    <div class="stat-card"><div class="stat-label">Average Score</div><div class="stat-value">${avg.toFixed(1)}</div></div>
    <div class="stat-card"><div class="stat-label">Low Score</div><div class="stat-value">${last.total}</div><div class="stat-sub">${last.name}</div></div>
    <div class="stat-card"><div class="stat-label">Total Entries</div><div class="stat-value">${D.participants.length}</div></div>
    <div class="stat-card green"><div class="stat-label">Top Champ Pick</div><div class="stat-value" style="font-size:1rem;letter-spacing:0">${D.metadata.topChampionPick}</div></div>
  `;

  document.getElementById('lb-search').addEventListener('input', e => { lbSearch = e.target.value.toLowerCase(); renderLB(); });
  document.querySelectorAll('#tab-leaderboard th[data-col]').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.col;
      lbSort = lbSort.col === col ? {col, asc:!lbSort.asc} : {col, asc:col==='rank'};
      document.querySelectorAll('#tab-leaderboard th').forEach(t => { t.classList.remove('sorted'); if(t.querySelector('.sort-arrow')) t.querySelector('.sort-arrow').remove(); });
      th.classList.add('sorted');
      th.insertAdjacentHTML('beforeend', `<span class="sort-arrow" style="margin-left:4px;opacity:0.6">${lbSort.asc?'▲':'▼'}</span>`);
      renderLB();
    });
  });

  document.getElementById('lb-loading').style.display = 'none';
  document.getElementById('lb-body').style.display = 'block';
  renderLB();
}

function renderLB() {
  let rows = D.participants.filter(p => !lbSearch || p.name.toLowerCase().includes(lbSearch));
  rows.sort((a,b) => {
    let av = a[lbSort.col] ?? (lbSort.asc ? Infinity : -Infinity);
    let bv = b[lbSort.col] ?? (lbSort.asc ? Infinity : -Infinity);
    if (typeof av==='string') return lbSort.asc ? av.localeCompare(bv) : bv.localeCompare(av);
    return lbSort.asc ? av-bv : bv-av;
  });

  document.getElementById('lb-count').textContent =
    rows.length < D.participants.length ? `${rows.length} of ${D.participants.length} shown` : `${D.participants.length} participants`;

  const tbd = v => `<td style="color:var(--text3);font-family:var(--font-mono)">${v > 0 ? v : '—'}</td>`;
  document.getElementById('lb-tbody').innerHTML = rows.map(p => {
    const r = p.rank;
    const rc = r===1?'rank-1':r===2?'rank-2':r===3?'rank-3':'';
    const rowc = r===1?'row-1':r===2?'row-2':r===3?'row-3':'';
    const medal = r===1?'🥇':r===2?'🥈':r===3?'🥉':'';
    return `<tr class="${rowc}">
      <td style="font-weight:700;text-align:center" class="${rc}">${medal||r}</td>
      <td style="font-weight:600;color:var(--text)">
        <a style="color:inherit;text-decoration:none;cursor:pointer" onclick="jumpToBracket(${JSON.stringify(p.name)})">${p.name}</a>
      </td>
      <td style="font-family:var(--font-display);font-size:1.05rem;color:var(--accent);letter-spacing:1px">${p.total}</td>
      ${tbd(p.totalR1)}${tbd(p.totalR2)}${tbd(p.totalS16)}${tbd(p.totalE8)}${tbd(p.totalFF)}
      <td style="font-size:0.82rem">${p.championPick||'—'}</td>
      <td style="font-size:0.82rem;color:var(--text2)">${p.runnerUpPick||'—'}</td>
    </tr>`;
  }).join('');
}

function jumpToBracket(name) {
  document.querySelector('[data-tab="bracket"]').click();
  const sel = document.getElementById('bracket-player');
  sel.value = name;
  sel.dispatchEvent(new Event('change'));
}

// ═══════════════════════════════════════
// HEAD-TO-HEAD
// ═══════════════════════════════════════
function initH2H() {
  const names = D.participants.map(p=>p.name).sort((a,b)=>a.localeCompare(b));
  const opts = names.map(n=>`<option value="${n}">${n}</option>`).join('');
  document.getElementById('h2h-a').innerHTML += opts;
  document.getElementById('h2h-b').innerHTML += opts;
  document.getElementById('h2h-a').addEventListener('change', renderH2H);
  document.getElementById('h2h-b').addEventListener('change', renderH2H);
}

function renderH2H() {
  const na = document.getElementById('h2h-a').value;
  const nb = document.getElementById('h2h-b').value;
  const box = document.getElementById('h2h-content');
  if (!na || !nb) { box.innerHTML = `<div class="empty"><div class="empty-icon">⚔️</div>Select two players above</div>`; return; }
  if (na === nb) { box.innerHTML = `<div class="empty"><div class="empty-icon">🤔</div>Please select two different players</div>`; return; }

  const pA = getParticipant(na), pB = getParticipant(nb);
  const groups = gamesByRound();
  let agree=0, diff=0, total=0, corrA=0, corrB=0, played=0;

  for (const rnd of ROUND_ORDER) {
    for (const g of (groups[rnd]||[])) {
      const pa = pA.picks[g.col], pb = pB.picks[g.col];
      if (!pa && !pb) continue;
      total++;
      if (norm(pa)===norm(pb)) agree++; else diff++;
      const ca = pickCorrect(g.col, pa), cb = pickCorrect(g.col, pb);
      if (ca !== null) { played++; if(ca) corrA++; if(cb) corrB++; }
    }
  }

  const scoreA = pA.total, scoreB = pB.total;
  const leader = scoreA > scoreB ? na.split(' ')[0] : scoreA < scoreB ? nb.split(' ')[0] : 'Tied!';
  const shortA = na.split(' ')[0], shortB = nb.split(' ')[0];

  let html = `
    <div class="h2h-summary">
      <div class="h2h-card leading">
        <div class="hc-label">Leading</div>
        <div class="hc-value" style="font-size:1.1rem">${leader}</div>
        <div class="hc-sub">${scoreA} vs ${scoreB} pts</div>
      </div>
      <div class="h2h-card agree">
        <div class="hc-label">Picks Agree</div>
        <div class="hc-value">${agree}</div>
        <div class="hc-sub">of ${total} picks</div>
      </div>
      <div class="h2h-card diff">
        <div class="hc-label">Picks Differ</div>
        <div class="hc-value">${diff}</div>
        <div class="hc-sub">${total?Math.round(diff/total*100):0}% different</div>
      </div>
      <div class="h2h-card">
        <div class="hc-label">${shortA} Correct</div>
        <div class="hc-value" style="color:var(--green)">${corrA}</div>
        <div class="hc-sub">of ${played} played</div>
      </div>
      <div class="h2h-card">
        <div class="hc-label">${shortB} Correct</div>
        <div class="hc-value" style="color:var(--green)">${corrB}</div>
        <div class="hc-sub">of ${played} played</div>
      </div>
      <div class="h2h-card">
        <div class="hc-label">Champion Pick</div>
        <div class="hc-value" style="font-size:0.85rem;letter-spacing:0;color:var(--text)">${pA.championPick||'—'}</div>
        <div class="hc-sub">vs ${pB.championPick||'—'}</div>
      </div>
    </div>`;

  for (const rnd of ROUND_ORDER) {
    const games = groups[rnd] || [];
    if (!games.length) continue;
    const isComplete = COMPLETE_ROUNDS.has(rnd);
    const badge = isComplete ? '<span class="pill pill-green">Complete</span>' : '<span class="pill pill-gray">TBD</span>';

    html += `<div style="margin-bottom:24px">
      <div class="h2h-round-title">${ROUND_LABELS[rnd]||rnd} ${badge}</div>
      <div class="h2h-grid-head">
        <div>Game</div><div>${shortA}</div><div>${shortB}</div>
        <div style="text-align:center">Same?</div>
        <div style="text-align:center">Result</div>
      </div>`;

    html += games.map(g => {
      const pa = pA.picks[g.col]||'—', pb = pB.picks[g.col]||'—';
      const ca = pickCorrect(g.col, pa), cb = pickCorrect(g.col, pb);
      const same = norm(pa)===norm(pb);
      const cls = c => c===true?'correct':c===false?'incorrect':'tbd-pick';
      const sameBadge = same
        ? '<span class="pill pill-green">Same</span>'
        : '<span class="pill pill-red">Diff</span>';
      const resultA = ca===true?'✅':ca===false?'❌':'—';
      const resultB = cb===true?'✅':cb===false?'❌':'—';
      return `<div class="h2h-row">
        <div style="color:var(--text2);font-size:0.78rem">${g.matchup}</div>
        <div class="${cls(ca)}">${pa}</div>
        <div class="${cls(cb)}">${pb}</div>
        <div style="text-align:center">${sameBadge}</div>
        <div style="text-align:center;font-size:0.82rem">${resultA}/${resultB}</div>
      </div>`;
    }).join('');

    html += `</div>`;
  }

  box.innerHTML = html;
}

// ═══════════════════════════════════════
// INDIVIDUAL BRACKET
// ═══════════════════════════════════════
function initBracket() {
  const names = D.participants.map(p=>p.name).sort((a,b)=>a.localeCompare(b));
  document.getElementById('bracket-player').innerHTML +=
    names.map(n=>`<option value="${n}">${n}</option>`).join('');
  document.getElementById('bracket-player').addEventListener('change', e => renderBracket(e.target.value));
}

function renderBracket(name) {
  const box = document.getElementById('bracket-content');
  if (!name) { box.innerHTML = `<div class="empty"><div class="empty-icon">📋</div>Select a participant above</div>`; return; }
  const p = getParticipant(name);
  if (!p) return;

  const groups = gamesByRound();
  let totalCorr=0, totalPlayed=0;
  const roundStats = {};
  for (const rnd of ROUND_ORDER) {
    let rc=0, rp=0;
    for (const g of (groups[rnd]||[])) {
      const res = pickCorrect(g.col, p.picks[g.col]);
      if (res!==null) { rp++; totalPlayed++; if(res){rc++;totalCorr++;} }
    }
    roundStats[rnd] = {correct:rc, played:rp};
  }

  const pct = totalPlayed > 0 ? Math.round(totalCorr/totalPlayed*100) : 0;

  let html = `
    <div class="player-hero">
      <div class="hero-name">${p.name}</div>
      <div class="hero-stat"><div class="hs-label">Rank</div><div class="hs-value">#${p.rank}</div></div>
      <div class="hero-stat"><div class="hs-label">Total</div><div class="hs-value">${p.total}</div></div>
      <div class="hero-stat"><div class="hs-label">Accuracy</div><div class="hs-value" style="color:var(--green)">${pct}%</div></div>
      <div class="hero-picks">
        <div class="hero-pick"><div class="hp-label">🏆 Champion Pick</div><div class="hp-value">${p.championPick||'—'}</div></div>
        <div class="hero-pick"><div class="hp-label">🥈 Runner-Up</div><div class="hp-value">${p.runnerUpPick||'—'}</div></div>
      </div>
    </div>
    <div class="acc-bar-wrap">
      <div class="acc-bar-labels"><span>Pick Accuracy (completed games)</span><strong>${totalCorr} / ${totalPlayed} correct</strong></div>
      <div class="acc-bar"><div class="acc-bar-fill" style="width:${pct}%"></div></div>
    </div>`;

  for (const rnd of ROUND_ORDER) {
    const games = groups[rnd]||[];
    if (!games.length) continue;
    const isComplete = COMPLETE_ROUNDS.has(rnd);
    const stats = roundStats[rnd];
    const badge = isComplete ? '<span class="pill pill-green">Complete</span>' : '<span class="pill pill-gray">TBD</span>';
    const statsStr = isComplete && stats.played > 0
      ? `<span class="round-pts">${stats.correct}/<strong>${stats.played}</strong> correct</span>` : '';

    html += `<div class="round-block">
      <div class="round-header">
        <h3>${ROUND_LABELS[rnd]||rnd}</h3>${badge}${statsStr}
      </div>
      <div class="games-grid">`;

    html += games.map(g => {
      const pick = p.picks[g.col]||'—';
      const res = pickCorrect(g.col, pick);
      const cls = res===true?'correct':res===false?'incorrect':'';
      const label = res===true?'<span class="pill pill-green">✓ Correct</span>':
                    res===false?`<span class="pill pill-red">✗ ${D.actualResults[g.col]||'Wrong'} won</span>`:
                    '<span class="pill pill-gray">TBD</span>';
      const pickColor = res===true?'color:var(--green)':res===false?'color:var(--red)':'color:var(--text)';
      return `<div class="game-card ${cls}">
        <div class="game-matchup">${g.matchup}</div>
        <div class="game-pick" style="${pickColor}">${pick}</div>
        <div class="game-result">${label}</div>
      </div>`;
    }).join('');

    html += `</div></div>`;
  }

  box.innerHTML = html;
}

// ═══════════════════════════════════════
// POOL INSIGHTS
// ═══════════════════════════════════════
function initInsights() {
  const groups = gamesByRound();

  // Most common picks per game
  const pickFreq = {};
  for (const rnd of ROUND_ORDER) {
    for (const g of (groups[rnd]||[])) {
      const counts = {};
      for (const p of D.participants) {
        const pick = p.picks[g.col];
        if (pick) counts[pick] = (counts[pick]||0)+1;
      }
      pickFreq[g.col] = counts;
    }
  }

  // Biggest upsets (everyone picked wrong)
  const upsets = [];
  for (const [col, winner] of Object.entries(D.actualResults)) {
    if (winner === 'TBD') continue;
    const freq = pickFreq[col] || {};
    const total = Object.values(freq).reduce((a,b)=>a+b,0);
    const wrongCount = total - (freq[winner]||0);
    if (wrongCount > 0) {
      upsets.push({ col, winner, wrong: wrongCount, total, pct: Math.round(wrongCount/total*100) });
    }
  }
  upsets.sort((a,b)=>b.pct-a.pct);

  // Score distribution
  const scores = D.participants.map(p=>p.total).sort((a,b)=>a-b);
  const buckets = {};
  for (const s of scores) {
    const b = Math.floor(s/5)*5;
    const key = `${b}-${b+4}`;
    buckets[key] = (buckets[key]||0)+1;
  }

  // Most agreed-upon correct picks
  const consensusCorrect = [];
  for (const [col, winner] of Object.entries(D.actualResults)) {
    if (winner === 'TBD') continue;
    const freq = pickFreq[col]||{};
    const total = Object.values(freq).reduce((a,b)=>a+b,0);
    const correctPct = Math.round((freq[winner]||0)/total*100);
    consensusCorrect.push({ col, winner, pct: correctPct, n: freq[winner]||0, total });
  }
  consensusCorrect.sort((a,b)=>a.pct-b.pct);
  const hardest = consensusCorrect.slice(0,8);
  const easiest = consensusCorrect.slice(-8).reverse();

  // Accuracy by participant
  const accuracy = D.participants.map(p => {
    let corr=0, played=0;
    for (const [col, winner] of Object.entries(D.actualResults)) {
      if (winner==='TBD') continue;
      played++;
      if (norm(p.picks[col])===norm(winner)) corr++;
    }
    return { name:p.name, pct: played>0?Math.round(corr/played*100):0, corr, played };
  }).sort((a,b)=>b.pct-a.pct);

  const maxBucket = Math.max(...Object.values(buckets));

  let html = `<div class="insights-grid">

    <div class="insight-card">
      <div class="insight-title">SCORE DISTRIBUTION</div>
      ${Object.entries(buckets).map(([k,v])=>`
        <div class="bar-row">
          <div class="bar-label" style="font-family:var(--font-mono);font-size:0.75rem">${k}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${Math.round(v/maxBucket*100)}%"></div></div>
          <div class="bar-count">${v}</div>
        </div>`).join('')}
    </div>

    <div class="insight-card">
      <div class="insight-title">HARDEST PICKS (% who got it right)</div>
      ${hardest.map(h=>`
        <div class="bar-row">
          <div class="bar-label" title="${h.col}">${h.winner}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${h.pct}%;background:var(--red)"></div></div>
          <div class="bar-count" style="color:var(--red)">${h.pct}%</div>
        </div>`).join('')}
    </div>

    <div class="insight-card">
      <div class="insight-title">EASIEST PICKS (% who got it right)</div>
      ${easiest.map(h=>`
        <div class="bar-row">
          <div class="bar-label" title="${h.col}">${h.winner}</div>
          <div class="bar-track"><div class="bar-fill green" style="width:${h.pct}%"></div></div>
          <div class="bar-count" style="color:var(--green)">${h.pct}%</div>
        </div>`).join('')}
    </div>

    <div class="insight-card">
      <div class="insight-title">TOP PICK ACCURACY</div>
      ${accuracy.slice(0,10).map((a,i)=>`
        <div class="bar-row">
          <div class="bar-label" title="${a.name}">${a.name.split(' ')[0]}</div>
          <div class="bar-track"><div class="bar-fill blue" style="width:${a.pct}%"></div></div>
          <div class="bar-count" style="color:var(--blue)">${a.pct}%</div>
        </div>`).join('')}
    </div>

  </div>

  <div class="section-title">BIGGEST UPSETS (games where most people got it wrong)</div>
  <div class="card" style="margin-bottom:24px">
    ${upsets.slice(0,10).map(u=>`
      <div class="upset-row">
        <div>
          <div style="font-weight:600;font-size:0.85rem">${u.col.replace(/^(R1|R2|Sweet Sixteen|Elite 8|Final Four):\s*/,'')}</div>
          <div style="font-size:0.75rem;color:var(--text3);margin-top:2px">Winner: <strong style="color:var(--green)">${u.winner}</strong></div>
        </div>
        <div style="text-align:right">
          <span class="pill pill-red">${u.wrong}/${u.total} got it wrong</span>
        </div>
      </div>`).join('')}
  </div>`;

  document.getElementById('insights-content').innerHTML = html;
}

// ═══════════════════════════════════════
// CHAMPION PICKS
// ═══════════════════════════════════════
function initChampion() {
  const champCounts = {}, ruCounts = {};
  for (const p of D.participants) {
    if (p.championPick) champCounts[p.championPick] = (champCounts[p.championPick]||0)+1;
    if (p.runnerUpPick) ruCounts[p.runnerUpPick] = (ruCounts[p.runnerUpPick]||0)+1;
  }
  const champSort = Object.entries(champCounts).sort((a,b)=>b[1]-a[1]);
  const ruSort = Object.entries(ruCounts).sort((a,b)=>b[1]-a[1]);
  const maxC = champSort[0]?.[1]||1;
  const maxR = ruSort[0]?.[1]||1;

  // Who picked each team
  const byChamp = {};
  for (const p of D.participants) {
    if (!p.championPick) continue;
    if (!byChamp[p.championPick]) byChamp[p.championPick] = [];
    byChamp[p.championPick].push(p);
  }

  let html = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:28px">
      <div class="insight-card">
        <div class="insight-title">🏆 CHAMPION PICKS</div>
        ${champSort.map(([team,n])=>`
          <div class="bar-row">
            <div class="bar-label">${team}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${Math.round(n/maxC*100)}%;background:var(--gold)"></div></div>
            <div class="bar-count" style="color:var(--gold)">${n}</div>
          </div>`).join('')}
      </div>
      <div class="insight-card">
        <div class="insight-title">🥈 RUNNER-UP PICKS</div>
        ${ruSort.map(([team,n])=>`
          <div class="bar-row">
            <div class="bar-label">${team}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${Math.round(n/maxR*100)}%;background:var(--silver)"></div></div>
            <div class="bar-count" style="color:var(--silver)">${n}</div>
          </div>`).join('')}
      </div>
    </div>

    <div class="section-title">WHO PICKED EACH CHAMPION</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px">
      ${champSort.map(([team,n])=>`
        <div class="card-sm">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
            <div style="font-family:var(--font-display);font-size:1rem;letter-spacing:1px">${team}</div>
            <span class="pill pill-orange">${n} ${n===1?'pick':'picks'}</span>
          </div>
          <div style="display:flex;flex-wrap:wrap;gap:6px">
            ${(byChamp[team]||[]).sort((a,b)=>a.total-b.total>0?-1:1).map(p=>`
              <span style="
                background:var(--bg4);border:1px solid var(--border);
                border-radius:6px;padding:3px 8px;font-size:0.73rem;color:var(--text2);
                cursor:pointer;transition:border-color 0.2s
              " onclick="jumpToBracket(${JSON.stringify(p.name)})"
                onmouseover="this.style.borderColor='var(--accent)'"
                onmouseout="this.style.borderColor='var(--border)'"
                title="Rank #${p.rank} — ${p.total} pts"
              >${p.name} <span style="color:var(--text3)">#${p.rank}</span></span>
            `).join('')}
          </div>
        </div>`).join('')}
    </div>`;

  document.getElementById('champion-content').innerHTML = html;
}
